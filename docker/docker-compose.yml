version: "3.9"

services:
  sqlserver:
    image: ${MSSQL_IMAGE:-mcr.microsoft.com/azure-sql-edge:latest}
    platform: ${MSSQL_PLATFORM:-linux/arm64}
    container_name: sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "1"
      MSSQL_SA_PASSWORD: "${MSSQL_PASS}"
      MSSQL_PID: "Developer"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_PASS}", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ""
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: enterprise_dw
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  oracle:
    image: ${ORACLE_IMAGE:-container-registry.oracle.com/database/free:23.4.0.0}
    container_name: oracle
    platform: ${ORACLE_PLATFORM:-linux/amd64}
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PWD: "${ORACLE_SYS_PASS}"
      ORACLE_CHARACTERSET: AL32UTF8
      ENABLE_ARCHIVELOG: "true"
    volumes:
      - oracle_data:/opt/oracle/oradata
    restart: unless-stopped
    shm_size: 1g
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -S sys/${ORACLE_SYS_PASS}@//localhost/FREE as sysdba | grep -q 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s

volumes:
  sqlserver_data:
  postgres_data:
  oracle_data:
